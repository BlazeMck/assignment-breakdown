# Local database for Assignment Breakdown.
#
# This runs a Supabase-compatible PostgreSQL database for development.
# Supabase Auth, Storage, Realtime, and Studio are not included here.

services:
  db:
    image: "${POSTGRES_IMAGE:-public.ecr.aws/supabase/postgres:17.6.1.072}"
    container_name: assignment_breakdown_db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-54322}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-assignment_breakdown}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
    volumes:
      - assignment_breakdown_db_data:/var/lib/postgresql/data
      - ./supabase/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-assignment_breakdown}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  assignment_breakdown_db_data:
